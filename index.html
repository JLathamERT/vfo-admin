<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The VFO Portal</title>
  <link rel="icon" href="https://yt3.googleusercontent.com/ytc/AIdro_n97ca7emLIuU5FJqACNZ65pElKhWZkhC3px2ceBsVbHR4=s160-c-k-c0x00ffffff-no-rj" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .role-picker { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: #162d4a; }
    .role-picker h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: #ffffff; margin-bottom: 0; }
    .role-subtitle { font-size: 13px; color: #8bacc8; margin-bottom: 32px; }
    .role-buttons { display: flex; gap: 12px; }
    .role-btn { padding: 12px 36px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #ffffff; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .role-btn:hover { background: rgba(255,255,255,0.12); border-color: #5b9fe6; }
  </style>
</head>
<body>
  <div class="role-picker">
    <h1>The VFO Portal</h1>
    <p class="role-subtitle">Select your portal</p>
    <div class="role-buttons">
      <button class="role-btn" onclick="window.location.href='admin.html'">Admin</button>
      <button class="role-btn" onclick="window.location.href='member.html'">Member</button>
    </div>
  </div>
</body>
</html>
